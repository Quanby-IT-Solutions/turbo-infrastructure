# =============================================================================
# Terraform Apply - runs on merge to main
# =============================================================================
name: "Terraform Apply"

on:
  push:
    branches: [main]
    paths:
      - "modules/**"
      - "environments/**"
      - "**.tf"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply (staging, production, or both)"
        required: true
        type: choice
        options:
          - staging
          - production
          - both

permissions:
  contents: read

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply-staging:
    name: Apply (staging)
    if: >
      github.event_name == 'push' ||
      github.event.inputs.environment == 'staging' ||
      github.event.inputs.environment == 'both'
    runs-on: ubuntu-latest
    environment: staging

    defaults:
      run:
        working-directory: environments/staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -var-file=terraform.tfvars

      - name: Show outputs
        run: terraform output -json

  apply-production:
    name: Apply (production)
    needs: [apply-staging]
    if: >
      always() && !failure() && !cancelled() && (
        github.event_name == 'push' ||
        github.event.inputs.environment == 'production' ||
        github.event.inputs.environment == 'both'
      )
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: environments/production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -var-file=terraform.tfvars

      - name: Show outputs
        run: terraform output -json
