# =============================================================================
# Terraform Apply - manual run only
# =============================================================================
name: "Terraform Apply"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply (staging, production, or both)"
        required: true
        type: choice
        options:
          - staging
          - production
          - both

permissions:
  contents: read

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply-staging:
    name: Apply (staging)
    if: >
      github.event.inputs.environment == 'staging' ||
      github.event.inputs.environment == 'both'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/turbo-template/staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.4"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: |
          # Generate tfvars from GitHub variables/secrets if terraform.tfvars doesn't exist
          if [ ! -f terraform.tfvars ]; then
            cat > terraform.tfvars <<EOF
          project_name = "${{ vars.PROJECT_NAME || 'turbo-template' }}"
          aws_region   = "${{ vars.AWS_REGION || 'ap-southeast-1' }}"
          EOF
          fi

          terraform apply -input=false -auto-approve -var-file=terraform.tfvars

      - name: Show outputs
        run: terraform output -json

  apply-production:
    name: Apply (production)
    needs: [apply-staging]
    if: >
      always() && !failure() && !cancelled() && (
        github.event.inputs.environment == 'production' ||
        github.event.inputs.environment == 'both'
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/turbo-template/production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.4"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: |
          # Generate tfvars from GitHub variables/secrets if terraform.tfvars doesn't exist
          if [ ! -f terraform.tfvars ]; then
            cat > terraform.tfvars <<EOF
          project_name = "${{ vars.PROJECT_NAME || 'turbo-template' }}"
          aws_region   = "${{ vars.AWS_REGION || 'ap-southeast-1' }}"
          EOF
          fi

          terraform apply -input=false -auto-approve -var-file=terraform.tfvars

      - name: Show outputs
        run: terraform output -json
